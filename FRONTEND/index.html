<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Wellness Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-100 via-purple-100 to-pink-100 min-h-screen flex items-center justify-center p-4">
    
    <!-- Main Login Card -->
    <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl max-w-md w-full p-10 transform hover:scale-[1.02] transition-all duration-300">
        <div class="text-center mb-8">
            <div class="w-24 h-24 bg-gradient-to-r from-blue-500 to-purple-600 rounded-2xl mx-auto mb-6 flex items-center justify-center">
                <i class="fas fa-brain text-3xl text-white"></i>
            </div>
            <h1 class="text-4xl font-bold bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent mb-2">
                Mental Wellness
            </h1>
            <p class="text-gray-600 text-lg">Start your wellness journey</p>
        </div>

        <!-- Disclaimer -->
        <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 mb-6 text-sm">
            <i class="fas fa-exclamation-triangle text-yellow-500 mr-2"></i>
            <strong>Important:</strong> This is <em>not</em> a medical diagnosis. Consult a professional for clinical advice.
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" id="email" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" 
                       placeholder="your@email.com">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" id="password" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
                       placeholder="••••••••">
            </div>

            <button type="submit" 
                    class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 px-6 rounded-xl font-semibold text-lg shadow-lg hover:shadow-xl hover:from-blue-700 hover:to-purple-700 transform hover:scale-[1.02] transition-all duration-200 flex items-center justify-center">
                <i class="fas fa-arrow-right mr-2"></i>
                Start Assessment
            </button>
        </form>

        <p class="text-center mt-6 text-sm text-gray-500">
            New user? <a href="#" class="text-blue-600 hover:underline font-medium">Create account</a>
        </p>
    </div>

    <script src="script.js"></script>
    <script>
        // Login functionality
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Simulate login
            setTimeout(() => {
                window.location.href = 'main.html';
            }, 1000);
        });
    </script>
</body>
</html>
